<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym App</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="topbar">
    <!-- Pulsanti principali -->
    <button onclick="nuovaScheda()">Nuova scheda</button>
    <button onclick="elencoSchede()">Elenco schede</button>
    <button onclick="salvaCloud()">Salva in Cloud</button>
    <button onclick="exportPDF()">Esporta PDF</button>
    
    <!-- Modalità (3 piccole scritte verticali) -->
    <div class="mode-selector">
      <span onclick="setMode('read')" id="mode-read" class="mode-option">👁 Lettura</span>
      <span onclick="setMode('edit')" id="mode-edit" class="mode-option active">✏️ Modifica</span>
      <span onclick="setMode('train')" id="mode-train" class="mode-option">💪 Allenamento</span>
    </div>
  </div>

  <div id="toolbar" class="toolbar hidden">
    <!-- Marker con dropdown integrato -->
    <div class="dropdown">
      <button onclick="toggleMarkerDropdown()" class="dropbtn">Marker ▼</button>
      <div id="markerDropdown" class="dropdown-content hidden">
        <div onclick="addMarkerFromDropdown('green', 'Bicipiti')" style="background:#4CAF50">Bicipiti</div>
        <div onclick="addMarkerFromDropdown('red', 'Tricipiti')" style="background:#f44336">Tricipiti</div>
        <div onclick="addMarkerFromDropdown('#fa8405', 'Addominali')" style="background:#fa8405">Addominali</div>
        <div onclick="addMarkerFromDropdown('#8f0663', 'Gambe')" style="background:#8f0663">Gambe</div>
        <div onclick="addMarkerFromDropdown('white', 'Dorso')" style="background:#cccccc; color:#000">Dorso</div>
        <div onclick="addMarkerFromDropdown('yellow', 'Spalle')" style="background:#FFEB3B; color:#000">Spalle</div>
      </div>
    </div>
    
    <button onclick="addSpacer()">Spazio</button>
    
    <!-- Nuovo dropdown per Inserisci Esercizio -->
    <div class="dropdown">
      <button onclick="toggleExerciseDropdown()" class="dropbtn">Inserisci esercizio ▼</button>
      <div id="exerciseDropdown" class="dropdown-content hidden">
        <div onclick="addExercise(1)">1 riga</div>
        <div onclick="addExercise(2)">2 righe</div>
        <div onclick="addExercise(3)">3 righe</div>
        <div onclick="addExercise(4)">4 righe</div>
        <div onclick="addExercise(5)">5 righe</div>
      </div>
    </div>
    
    <!-- Selettore Jammer -->
    <div class="toggle-container">
      <span class="toggle-label">Jammer:</span>
      <button id="jammerToggle" onclick="toggleJammer()" class="toggle-btn off">No Jammer</button>
    </div>
    
    <!-- Checkbox DX/SX -->
    <div class="checkbox-group">
      <label class="checkbox-label">
        <input type="checkbox" id="checkDX" onchange="updateSideLabels()"> DX
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="checkSX" onchange="updateSideLabels()"> SX
      </label>
    </div>
  </div>
</header>

<main id="app"></main>

<script src="cloud.js"></script>
<script src="app.js"></script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./service-worker.js")
      .then(() => console.log("SW registrato"))
      .catch(err => console.log("Errore SW:", err));
  });
}
</script>
</body>
</html>
