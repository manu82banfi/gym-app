<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym App</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="topbar">
    <button onclick="nuovaScheda()">Nuova scheda</button>
    <button onclick="elencoSchede()">Elenco schede</button>
    <button onclick="salvaCloud()">Salva in Cloud</button>
    <button onclick="exportPDF()">Esporta PDF</button>
  </div>

  <div id="toolbar" class="toolbar hidden">
    <select id="markerColor">
      <option value="green">Bicipiti</option>
      <option value="red">Tricipiti</option>
      <option value="orange">Addominali</option>
      <option value="violet">Gambe</option>
      <option value="#8f0663">Gambe (custom)</option>
      <option value="white">Dorso</option>
      <option value="yellow">Spalle</option>
    </select>

    <button onclick="addMarker()">Marker</button>
    <button onclick="addSpacer()">Spazio</button>
    <button onclick="addExercise(1)">Esercizio 1</button>
    <button onclick="addExercise(2)">Esercizio 2</button>
    <button onclick="addExercise(3)">Esercizio 3</button>
    <button onclick="addExercise(4)">Esercizio 4</button>
  </div>
</header>

<main id="app"></main>

<script src="cloud.js"></script>
<script src="app.js"></script>
</body>
</html>
