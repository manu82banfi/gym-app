<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym App</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111">

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h2>Gym App</h2>

  <button onclick="nuovaScheda()">Nuova scheda</button>
  <button onclick="apriSchede()">Schede</button>

  <select id="tipoRiga">
    <option value="exercise">Esercizio</option>
    <option value="spacer">Spazio</option>
    <option value="marker">Marker</option>
  </select>

  <button onclick="aggiungiRiga()">Aggiungi riga</button>
  <button onclick="salvaCloud()">Salva in Cloud</button>
</header>

<main id="app"></main>

<script src="cloud.js"></script>
<script src="app.js"></script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
